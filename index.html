<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Finance | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="assets/bitcoin.ico" type="image/x-icon">
</head>
<body>

    <div class="container">
        <header class="system-header">
            <h1>[⚡] SYSTEM_FINANCE v1.0</h1>
            <div id="system-clock">00:00:00</div>
        </header>

        <main class="dashboard">
            
            <section class="panel input-panel">
                <h2>PAINEL_DE_CONTROLE</h2>
                
                <div class="form-group">
                    <label for="initial-value">VALOR INICIAL (R$):</label>
                    <input type="number" id="initial-value" placeholder="Ex: 1000">
                </div>

                <div class="form-group">
                    <label>SELECIONE O ATIVO:</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="asset" value="btc" checked> Bitcoin (High Risk)
                        </label>
                        <label>
                            <input type="radio" name="asset" value="eth"> Ethereum (Medium Risk)
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="months">TEMPO DE INVESTIMENTO (MESES):</label>
                    <input type="number" id="months" placeholder="Ex: 12">
                </div>

                <button id="btn-simulate">EXECUTAR SIMULAÇÃO</button>
            </section>

            <section class="panel result-panel">
                <h2>PERFORMANCE_DIGITAL</h2>
                
                <div class="stat-box">
                    <p>RENDIMENTO LÍQUIDO ESTIMADO:</p>
                    <h1 id="estimated-yield">R$ 0,00</h1>
                </div>

                <div class="progress-container">
                    <div class="progress-bar" id="bar"></div>
                </div>

                <div id="financial-statement" style="display: none; margin-bottom: 25px;">
                    <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 8px; color: #888;">
                        <span>RENDIMENTO BRUTO:</span>
                        <span id="gross-value" style="color: #fff; font-weight: bold;">R$ 0,00</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 8px; color: #888;">
                        <span>IMPOSTO RETIDO (15%):</span>
                        <span id="tax-value" style="color: #ff4444; font-weight: bold;">- R$ 0,00</span>
                    </div>
                    <hr style="border: 0; border-top: 1px dashed var(--border); margin: 10px 0;">
                </div>

                <div class="system-status">
                    <p>STATUS DO SISTEMA:</p>
                    <span id="system-message">Aguardando parâmetros para simulação...</span>
                </div>
            </section>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
